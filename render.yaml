services:
  - type: web
    name: izunna-rex-portfolio
    runtime: python
    plan: free
    buildCommand: |
      pip install -r requirements.txt
      python myportfolio/manage.py collectstatic --noinput
    startCommand: |
      python myportfolio/manage.py migrate --noinput
      python myportfolio/manage.py seed_projects
      gunicorn core.wsgi:application --chdir myportfolio
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: false
      - key: DJANGO_ALLOWED_HOSTS
        value: .onrender.com
      - key: DJANGO_CSRF_TRUSTED_ORIGINS
        value: https://*.onrender.com
      - key: EMAIL_HOST
        value: smtp.gmail.com
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_USE_TLS
        value: "True"
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: DEFAULT_FROM_EMAIL
        sync: false
      - key: CONTACT_RECEIVER_EMAIL
        value: izunnaegba2@gmail.com
      - key: DATABASE_URL
        fromDatabase:
          name: izunna-rex-db
          property: connectionString

databases:
  - name: izunna-rex-db
    plan: free
